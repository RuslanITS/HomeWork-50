<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com">

  <body>

      const Header = () => {

            <div className="header-botttom">

                Бесплатная <br /> доставка

                <div className="heder-number">
                  <span className="header-number">+8 916 460-19-60</span>
                  <button type="button">Заказать звонок</button>
                </div>
              </div>
            </div>
          </header>
        );
      };

      const Sidebar = () => {
        return (

            <nav className="ingredients">
              <h3 className="ingredients-title">Ингредиенты</h3>
              <ul className="ingredients-list">

                <li><a href="#">Ферменты для сыра</a></li>
                <li><a href="#">Хлористый кальций</a></li>
                <li><a href="#">Плесень для сыра</a></li>
                <li><a href="#">Кисломолочные закваски</a></li>

            </nav>
          </aside>
        );
      };
      
      const ReceiptCard = (props) => {
        return (
          <div className="receipt-card">
            <div className="receipt-photo">
              <img src={props.img} alt="cheese" />
            </div>
            <div className="receipt-info">
              <h5 className="receipt-title">{props.title}</h5>
              <a href="#" className="link-arrow">Смотреть</a>
            </div>
          </div>
        );
      };

      const AdditionCard = (props) => {
        return (
          <article className="additions-card">
            <img src={props.img} alt={props.title} />
            <div className="additions-content">
              <span className="additions-text">{props.title}</span>
              <p>{props.text}</p>

            </div>

                  title="Твердые сыры"
                  img="uploads/Receipes-ard.png"
                />
                <ReceiptCard
                  title="Полутвердые сыры"
                  img="uploads/Receipes-Card3.png"
                />
                <ReceiptCard

                  img="uploads/Receipes-Card4.png"
                />
                <ReceiptCard
                  title="Кисломолочные сыры"
                  img="uploads/Receipes-Card5.png"
                />

              </div>
              <p>г. Москва, улица Свободы 1/7</p>
            </div>
          </footer>

      const Run = () => {
        return (
          <div>

            <div className="container content">
              <Sidebar />

            </div>
            <Footer />

      ReactDOM.createRoot(container).render(<Run />);

</html>
