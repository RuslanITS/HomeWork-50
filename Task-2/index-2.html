      const Header = () => {

              <span className="header-text">

            </div>
          </header>

      const Sidebar = () => {

          </aside>
        );
      };
      
      const ReceiptCard = (props) => {
        return (
          <div className="receipt-card">
            <div className="receipt-photo">
              <img src={props.img} alt="cheese" />
            </div>
            <div className="receipt-info">
              <h5 className="receipt-title">{props.title}</h5>
              <a href="#" className="link-arrow">Смотреть</a>
            </div>
          </div>
        );
      };

      const AdditionCard = (props) => {
        return (
          <article className="additions-card">
            <img src={props.img} alt={props.title} />
            <div className="additions-content">
              <span className="additions-text">{props.title}</span>
              <p>{props.text}</p>
              <a href="#">Читать далее</a>
            </div>
          </article>
        );
      };

      const Additions = () => {
        return (
          <section className="additions">
            <h2 className="additions-title">Последние добавленные</h2>

            <div className="additions-cards">
              <AdditionCard
                img="uploads/image4.png"
                title="Сырная тарелка"
                text="Особенно характерно наличие дырочек разных размеров..."
              />

                text="Особенно характерно наличие в структуре..."

              <AdditionCard

            </div>

      const Main = () => {
        return (

                  title="Молодые сыры"
                  img="uploads/Receipes-1.jpg"
                />
                <ReceiptCard
                  title="Твердые сыры"
                  img="uploads/Receipes-ard.png"
                />
                <ReceiptCard
                  title="Полутвердые сыры"
                  img="uploads/Receipes-Card3.png"
                />
              </div>
            </section>
            <Additions />
          </main>
        );

      const Footer = () => {
        return (

                <span className="ffooter-icon-2"></span>

              <p>г. Москва, улица Свободы 1/7</p>

          </footer>
        );
      };
      
      const Run = () => {
        return (
          <div>
            <Header />

            <div className="container content">
              <Sidebar />
              <Main />
            </div>
            <Footer />
          </div>
        );
      };
      
      ReactDOM.createRoot(container).render(<Run />);
